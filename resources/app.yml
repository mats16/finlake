resources:
  apps:
    finlake_app:
      name: finlake-${bundle.target}
      description: FinOps Lakehouse App
      source_code_path: ../
      user_api_scopes:
        - sql
        - genie
        - postgres
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
        - catalog.connections
        - ai-gateway
        - workspace.workspace
      resources:
        - name: lakebase
          postgres:
            branch: ${resources.postgres_projects.finlake_db.id}/branches/production
            database: ${resources.postgres_projects.finlake_db.id}/branches/production/databases/databricks-postgres
            permission: CAN_CONNECT_AND_CREATE

  postgres_projects:
    finlake_db:
      project_id: finlake-${bundle.target}
      display_name: 'FinLake Database ${bundle.target}'
      pg_version: 17
      default_branch: projects/finlake-${bundle.target}/branches/production
      default_endpoint_settings:
        autoscaling_limit_min_cu: 0.5
        autoscaling_limit_max_cu: 4
        suspend_timeout_duration: '300s'
      lifecycle:
        prevent_destroy: false
      custom_tags:
        - key: Project
          value: finops
        - key: CostCenter
          value: finlake
        - key: Environment
          value: ${bundle.target}
