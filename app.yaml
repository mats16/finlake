command:
  - npm
  - run
  - start
  - --workspace=apps/api

env:
  - name: NODE_ENV
    value: production
  - name: WEB_DIST_DIR
    value: apps/web/dist
  - name: MIGRATE_ON_BOOT
    value: 'true'
  - name: SQLITE_PATH
    value: /home/app/data/finlake.db
  # When LAKEBASE_ENDPOINT is injected, use Lakebase. When not injected, use SQLite.
  - name: LAKEBASE_ENDPOINT
    valueFrom: lakebase
